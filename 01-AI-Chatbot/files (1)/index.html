<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SupportBot — AI Customer Support</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #171b21;
    --card: #20262f;
    --card-alt: #262d38;
    --border: #313a47;
    --text: #e8eaed;
    --muted: #8b93a1;
    --amber: #e8a33d;
    --amber-dim: #6b5528;
    --green: #4cc38a;
    --red: #e5686b;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 20% 0%, #232a34 0%, var(--bg) 55%);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .app {
    width: 100%;
    max-width: 520px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .header {
    padding: 20px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--amber), #c97f1f);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    color: #1a1206;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    margin: 0;
    letter-spacing: 0.2px;
  }

  .header-text p {
    margin: 2px 0 0;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    box-shadow: 0 0 6px var(--green);
  }

  .chat-window {
    height: 440px;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 82%;
  }

  .msg-row.user { align-self: flex-end; align-items: flex-end; }
  .msg-row.bot { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14.5px;
    line-height: 1.45;
  }

  .msg-row.user .bubble {
    background: var(--amber);
    color: #241a05;
    border-bottom-right-radius: 4px;
  }

  .msg-row.bot .bubble {
    background: var(--card-alt);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .debug-tag {
    margin-top: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .debug-tag .intent {
    color: var(--amber);
  }

  .confidence-bar {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .confidence-fill {
    height: 100%;
    background: var(--green);
  }

  .confidence-fill.low { background: var(--red); }

  .input-row {
    display: flex;
    gap: 8px;
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: var(--card);
  }

  #msgInput {
    flex: 1;
    background: var(--card-alt);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
  }

  #msgInput:focus { border-color: var(--amber); }

  #sendBtn {
    background: var(--amber);
    border: none;
    border-radius: 10px;
    padding: 0 18px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    color: #241a05;
    cursor: pointer;
    font-size: 13px;
  }

  #sendBtn:active { transform: scale(0.97); }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 16px 12px;
  }

  .chip {
    font-size: 11.5px;
    padding: 6px 10px;
    background: var(--card-alt);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }

  .chip:hover { border-color: var(--amber); color: var(--amber); }

  @media (prefers-reduced-motion: no-preference) {
    .msg-row { animation: rise 0.25s ease; }
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="avatar">SB</div>
    <div class="header-text">
      <h1>SupportBot</h1>
      <p><span class="dot"></span> AI customer support — intent classification live</p>
    </div>
  </div>

  <div class="chat-window" id="chatWindow"></div>

  <div class="suggestions">
    <div class="chip" data-msg="Where is my order?">Track order</div>
    <div class="chip" data-msg="I want a refund">Refund</div>
    <div class="chip" data-msg="Payment failed">Payment issue</div>
    <div class="chip" data-msg="Talk to a human">Human agent</div>
  </div>

  <div class="input-row">
    <input id="msgInput" type="text" placeholder="Ask about orders, refunds, shipping..." autocomplete="off">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const chatWindow = document.getElementById('chatWindow');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');

function addMessage(text, sender, meta) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + sender;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  row.appendChild(bubble);

  if (sender === 'bot' && meta) {
    const tag = document.createElement('div');
    tag.className = 'debug-tag';
    const pct = Math.round(meta.confidence * 100);
    tag.innerHTML = `intent: <span class="intent">${meta.intent}</span> · ${pct}%
      <span class="confidence-bar"><span class="confidence-fill ${pct < 50 ? 'low' : ''}" style="width:${pct}%"></span></span>`;
    row.appendChild(tag);
  }

  chatWindow.appendChild(row);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

async function sendMessage(text) {
  if (!text.trim()) return;
  addMessage(text, 'user');
  msgInput.value = '';

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    addMessage(data.reply, 'bot', { intent: data.intent, confidence: data.confidence });
  } catch (err) {
    addMessage("Sorry, something went wrong connecting to the server.", 'bot', { intent: 'error', confidence: 0 });
  }
}

sendBtn.addEventListener('click', () => sendMessage(msgInput.value));
msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(msgInput.value); });
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => sendMessage(chip.dataset.msg));
});

addMessage("Hi! I'm SupportBot. Ask me about your order, a refund, shipping, or account issues.", 'bot', { intent: 'greeting', confidence: 1 });
</script>

</body>
</html>
